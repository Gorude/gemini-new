<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./nemon.svg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#131314" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="./icon-192x192.png" />
    <title>Nemon</title>
    <style>
      html { background-color: #131314; } /* Default dark background to prevent white flash */
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('nemon-theme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.setAttribute('data-theme', 'escuro');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
